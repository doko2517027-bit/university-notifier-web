<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>問題一覧 | CareMate</title>

<link rel="stylesheet" href="style.css">

<script>
if(localStorage.getItem("theme")==="dark"){
    document.documentElement.classList.add("dark");
}
</script>
</head>

<body class="page-loading">

<div class="top-buttons">

    <button id="backButton" class="circle-button">←</button>

    <h2>📝 問題一覧</h2>

    <div class="top-right">
        <button id="themeButton" class="circle-button">🌙</button>

        <button id="profileButton" class="circle-button">
            <img id="topProfileImage" src="images/default.png" class="header-profile-image">
        </button>
    </div>

</div>

<div class="card setting-card">

    <h2>📝 問題一覧</h2>

    <p id="unitInfo">
        読み込み中...
    </p>

</div>

<div class="card setting-card">

    <h3>公開設定</h3>

    <p>
        AI生成結果を確認してから、学生に公開します。
    </p>

    <button id="publishQuestions" class="btn btn-primary">
        公開する
    </button>

</div>

<div id="questionList">
    読み込み中...
</div>

<script type="module" src="exam_questions_admin.js"></script>

</body>
</html>
