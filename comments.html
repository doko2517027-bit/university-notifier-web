<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>コメント</title>

<link rel="stylesheet" href="style.css">

<script>
if(localStorage.getItem("theme")==="dark"){
    document.documentElement.classList.add("dark");
}
</script>

</head>
<body>

    <div class="top-buttons">

        <button id="backButton" class="circle-button">
        ←
        </button>

        <h2>コメント</h2>

        <div style="width:44px"></div>

        <div class="top-right">

            <button id="themeButton" class="circle-button">
                🌙
            </button>

            <button id="profileButton" class="circle-button">

                <img
                    id="topProfileImage"
                    src="images/default.png"
                    class="header-profile-image">

            </button>
        </div>

    </div>

    <!-- 元の投稿 -->
    <div id="postCard"></div>

    <!-- コメント一覧 -->
    <div id="commentList"></div>

    <!-- コメント入力 -->
    <div class="comment-input">

        <textarea
            id="commentText"
            placeholder="コメントを書く..."></textarea>

        <button id="sendComment" class="btn btn-primary">
        送信
        </button>

    </div>

    <script type="module" src="comments.js"></script>

</body>
</html>
