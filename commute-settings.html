<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

<title>通学設定 | CareMate</title>

<link rel="stylesheet" href="style.css">

<script>

if(localStorage.getItem("theme")==="dark"){

    document.documentElement.classList.add("dark");

}

</script>

</head>

<body class="page-loading">

<div class="top-buttons">

    <div id="userName">
        読み込み中...
    </div>

    <div class="top-right">

        <button
            id="themeButton"
            class="circle-button">

            🌙

        </button>

        <button
            id="profileButton"
            class="circle-button">

            <img
                id="topProfileImage"
                class="header-profile-image"
                src="images/default.png">

        </button>

    </div>

</div>

<header class="header">

    <div class="logo">
        🧭
    </div>

    <h1>

        通学設定

    </h1>

    <p>

        利用する交通機関を設定します

    </p>

</header>

<div class="card setting-card">

    <h2>

        🚆 電車

    </h2>

    <button
        id="trainSettingButton"
        class="btn btn-primary">

        電車ルートを設定

    </button>

</div>

<div class="card setting-card">

    <h2>

        🚌 バス

    </h2>

    <button
        id="busSettingButton"
        class="btn btn-primary">

        バスルートを設定

    </button>

</div>

<hr>

<div
    id="commuteEditor"
    style="display:none;">

    <div class="card setting-card">

        <h2 id="editorTitle">
            経路検索
        </h2>

        <label>出発地</label>

        <input
            id="departureSearch"
            type="text"
            placeholder="例：川崎大師">

        <div id="departureResults"></div>
        <div id="departureSelected"></div>

        <hr>

        <label>経由地（任意）</label>

        <input
            id="viaSearch"
            type="text"
            placeholder="例：横浜">

        <div id="viaResults"></div>
        <div id="viaSelected"></div>

        <hr>

        <label>到着地</label>

        <input
            id="arrivalSearch"
            type="text"
            placeholder="例：石川町">

        <div id="arrivalResults"></div>
        <div id="arrivalSelected"></div>

        <hr>

        <label>時刻指定</label>

        <select id="timeType">
            <option value="departure">出発時刻</option>
            <option value="arrival">到着時刻</option>
        </select>

        <input
            id="routeTime"
            type="time">

        <br><br>

        <button
            id="searchRouteButton"
            class="btn btn-primary">

            経路を検索

        </button>

    </div>

    <div
        id="routeResults"
        class="card setting-card"
        style="display:none;">

        <h2>
            ルート候補
        </h2>

        <div id="routeResultList"></div>

    </div>

</div>

<div class="card setting-card">

<h2>

登録済みルート

</h2>

<div id="currentCommuteSetting">

読み込み中...

</div>

</div>

<div class="card setting-card">

    <small>
        駅・路線情報提供：HeartRails Express
    </small>

</div>

<div style="height:100px;"></div>

<nav class="bottom-nav">

    <a href="index.html">
        🏠<br>
        <span>ホーム</span>
    </a>

    <a href="assignments.html">
        📚<br>
        <span>課題</span>
    </a>

    <a href="share.html">
        🤝<br>
        <span>共有</span>
    </a>

    <a href="news.html">
        📢<br>
        <span>お知らせ</span>
    </a>

    <a href="settings.html">
        ⚙️<br>
        <span>設定</span>
    </a>

</nav>

<script type="module" src="commute-settings.js"></script>

</body>

</html>
