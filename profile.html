<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>プロフィール</title>

<link rel="stylesheet" href="style.css">

<script>
if(localStorage.getItem("theme")==="dark"){
    document.documentElement.classList.add("dark");
}
</script>

</head>

<body>

    <div class="top-buttons">

        <button id="backButton" class="circle-button">
        ←
        </button>

        <h2>プロフィール</h2>

        <div style="width:44px"></div>

        <div class="top-right">

        <button id="themeButton" class="circle-button">
            🌙
        </button>

    </div>

    <input
        type="file"
        id="photoPicker"
        accept="image/*"
        hidden>

    <div id="photoMenu" class="photo-menu">

        <div class="photo-sheet">

            <button id="choosePhoto">
                📷 写真ライブラリ
            </button>

            <button id="takePhoto">
                📸 写真を撮る
            </button>

            <button id="resetPhoto">
                👤 初期アイコンに戻す
            </button>

            <button id="cancelPhoto">
                キャンセル
            </button>

        </div>

    </div>

    </div>

    <div class="card profile-card">

        <img
            id="profileImage"
            src="images/default.png">

        <h2 id="userName">

        </h2>

        <p id="studentNumber">

        </p>

    </div>

    <div class="card profile-stats">

        <div>

            <h2 id="postCount">
                0
            </h2>

            <small>
                投稿
            </small>

        </div>

        <div>

            <h2 id="likeCount">
                0 / 0
            </h2>

            <small>
                ❤️された / ❤️した
            </small>

        </div>

        <div>

            <h2 id="commentCount">
                0
            </h2>

            <small>
                コメント
            </small>

        </div>

    </div>

        <div class="profile-tabs">

        <button
            id="myPosts"
            class="active">

            📝 投稿

        </button>

        <button
            id="likedPosts">

            ❤️ いいね

        </button>

        <button
            id="myComments">

            💬 コメント

        </button>

    </div>

    <div id="profileContent">

    </div>

    <script
        type="module"
        src="profile.js">

    </script>

</body>

</html>
