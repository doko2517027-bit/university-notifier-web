<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>投稿</title>

<link rel="stylesheet" href="style.css">

<script>
if(localStorage.getItem("theme")==="dark"){
    document.documentElement.classList.add("dark");
}
</script>

</head>

<body class="page-loading">

<div class="top-buttons">

    <button id="backButton" class="circle-button">
    ←
    </button>

    <h2>新規投稿</h2>

    <div style="width:44px"></div>

    <div class="top-right">

        <button id="themeButton" class="circle-button">
            🌙
        </button>

        <button id="profileButton" class="circle-button">

            <img
                id="topProfileImage"
                src="images/default.png"
                class="top-profile-image">

        </button>

    </div>

</div>

<div class="card setting-card">

<textarea
    id="postText"
    rows="8"
    placeholder="みんなに共有したいことを書こう"></textarea>

<br><br>

<button id="postButton" class="btn btn-primary">
投稿する
</button>

<div class="post-attachments">

    <button
        id="selectImage"
        type="button"
        class="btn btn-secondary">

        📷 写真

    </button>

    <button
        id="selectPdf"
        type="button"
        class="btn btn-secondary">

        📄 PDF

    </button>

</div>

<input
    id="imagePicker"
    type="file"
    accept="image/*"
    hidden>

<input
    id="pdfPicker"
    type="file"
    accept="application/pdf"
    hidden>

<p id="selectedFile"></p>

</div>

<script type="module" src="new_post.js"></script>

</body>

</html>
