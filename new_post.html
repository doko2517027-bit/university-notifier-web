<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>投稿</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="top-buttons">

    <button id="backButton">
        ←もどる
    </button>

    <h2>新規投稿</h2>

    <div style="width:44px"></div>

    <div class="top-right">

        <button id="themeButton">
            🌙
        </button>

        <img
            id="profileButton"
            class="profile-button"
            src="images/default.png">

    </div>

</div>

<div class="setting-card">

<textarea
    id="postText"
    rows="8"
    placeholder="みんなに共有したいことを書こう"></textarea>

<br><br>

<button
    class="primary-button"
    id="postButton">

投稿する

</button>

</div>

<script type="module" src="new_post.js"></script>

</body>

</html>
