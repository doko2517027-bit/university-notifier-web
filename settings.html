<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設定</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="top-buttons">

    <button id="themeButton">
        🌙
    </button>

</div>

<header class="header">

    <div class="logo">⚙️</div>

    <h1>設定</h1>

    <p>University Notifier</p>

</header>

<h2>登録情報</h2>

<div class="setting-card">

    <p><b>学科</b></p>
    <p id="departmentText"></p>

    <p><b>専攻</b></p>
    <p id="majorText"></p>

    <p><b>学年</b></p>
    <p id="gradeText"></p>

    <p><b>学籍番号</b></p>
    <p id="sutudentNumber"></p>

</div>

<h2>アプリ情報</h2>

<div class="setting-card">

    <p id="versionText"></p>

</div>

<h2>登録解除</h2>

<div class="setting-card">

    <button id="unregister" class="danger-button">
        登録解除
    </button>

</div>

<br>

<button id="back" class="primary-button">
ホームへ戻る
</button>

<script src="settings.js"></script>

</body>
</html>
