<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>設定</title>

<link rel="stylesheet" href="style.css">

<script>
if(localStorage.getItem("theme")==="dark"){
    document.documentElement.classList.add("dark");
}
</script>

</head>

<body class="page-loading">

<div class="top-buttons">

    <div id="userName">
        Unknownさん
    </div>

    <div class="top-right">

        <button id="themeButton" class="circle-button">
            🌙
        </button>

        <button id="profileButton" class="circle-button">

            <img
                id="topProfileImage"
                src="images/default.png"
                class="header-profile-image">

        </button>

    </div>

</div>

<header class="header">

    <div class="logo">⚙️</div>

    <h1>設定</h1>

    <p>CareMateApp</p>

</header>

<h2>登録情報</h2>

<div class="card setting-card">

    <p><b>学科</b></p>
    <p id="departmentText"></p>

    <p><b>専攻</b></p>
    <p id="majorText"></p>

    <p><b>学年</b></p>
    <p id="gradeText"></p>

</div>

<h2>アプリ情報</h2>

<div class="card setting-card">

    <p id="versionText"></p>

</div>

<h2>通知設定</h2>

<div class="card setting-card">

    <label class="setting-row">
        <span>
            <b>🗓 時間割変更</b><br>
            <small>時間割PDFに変更があった時</small>
        </span>
        <input type="checkbox" id="notifySchedule">
    </label>

    <label class="setting-row">
        <span>
            <b>📢 コースニュース</b><br>
            <small>コースニュースに新しいお知らせが出た時</small>
        </span>
        <input type="checkbox" id="notifyCourseNews">
    </label>

    <label class="setting-row">
        <span>
            <b>📚 新しい課題</b><br>
            <small>Manabaに新しい未提出課題が出た時</small>
        </span>
        <input type="checkbox" id="notifyAssignment">
    </label>

    <label class="setting-row">
        <span>
            <b>⏰ 課題リマインダー</b><br>
            <small>締切前にお知らせ</small>
        </span>
        <input type="checkbox" id="notifyReminder">
    </label>

    <label
        id="systemNewsRow"
        class="setting-row">
        <span>
            <b>💙 CareMateからのお知らせ</b><br>
            <small>運営からのお知らせが投稿された時</small>
        </span>
        <input type="checkbox" id="notifySystemNews">
    </label>

    <div id="shareNotificationGroup">

    <label class="setting-row">
        <span>
            <b>🤝 新規投稿</b><br>
            <small>共有に新しい投稿があった時</small>
        </span>
        <input type="checkbox" id="notifySharePost">
    </label>

    <label class="setting-row">
        <span>
            <b>❤️ いいね</b><br>
            <small>自分の投稿にいいねされた時</small>
        </span>
        <input type="checkbox" id="notifyLike">
    </label>

    <label class="setting-row">
        <span>
            <b>💬 コメント</b><br>
            <small>自分の投稿にコメントされた時</small>
        </span>
        <input type="checkbox" id="notifyComment">
    </label>

    </div>

</div>

<h2>アカウント</h2>

<div class="card setting-card">

    <p>
        ログアウト後はログイン画面に戻ります。
    </p>

    <button id="logout" class="btn btn-primary">
    ログアウト
    </button>

</div>


<h2>危険な操作</h2>

<div class="card setting-card">

    <p>
        登録情報・通知設定を削除します。
    </p>

    <button id="unregister" class="btn btn-danger">
    登録解除
    </button>

</div>

<nav class="bottom-nav">

    <a href="index.html">
        🏠<br>
        <span>ホーム</span>
    </a>

    <a href="assignments.html">
        📚<br>
        <span>課題</span>
    </a>

    <a href="share.html">
        🤝<br>
        <span>共有</span>
    </a>

    <a href="news.html">
        📢<br>
        <span>お知らせ</span>
    </a>

    <a 
		id="settingsTab"
	    href="settings.html" class="active">
        ⚙️<br>
        <span>設定</span>
    </a>

</nav>

<script type="module" src="settings.js"></script>

</body>
</html>
