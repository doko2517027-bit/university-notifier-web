<!DOCTYPE html>
<html lang="ja">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta charset="UTF-8">
    <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Manaba再設定 | CareMateApp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-loading">

<header class="header">
    <div class="logo">🔐</div>
    <h1>CareMateApp</h1>
    <p>Manaba再設定</p>
</header>

<div class="card setting-card">

    <p>
        Manabaのパスワードを再設定してください。
        正しいパスワードを保存すると、課題・コースニュース・通知が再び利用できます。
    </p>

    <h3>学籍番号</h3>

    <input
        id="studentNumber"
        type="text"
        maxlength="7"
        placeholder="例：2510044">

    <h3>Manabaパスワード</h3>

    <input
        id="manabaPassword"
        type="password"
        placeholder="Manabaパスワード">

    <h3>確認</h3>

    <input
        id="manabaPasswordConfirm"
        type="password"
        placeholder="もう一度入力">

    <button id="savePassword" class="primary-button">
        保存する
    </button>

</div>

<script type="module" src="set-password.js"></script>

</body>
</html>
