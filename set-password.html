<!DOCTYPE html>
<html lang="ja">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta charset="UTF-8">
    <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>パスワード設定 | CareMateApp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-loading">

<header class="header">
    <div class="logo">🔐</div>
    <h1>CareMateApp</h1>
    <p>アプリ用パスワード設定</p>
</header>

<div class="card setting-card">

    <p>
        ログイン機能追加のため、アプリ用パスワードを設定してください。
    </p>

    <h3>学籍番号</h3>

    <input
        id="studentNumber"
        type="text"
        maxlength="7"
        placeholder="例：2510044">

    <h3>アプリ用パスワード</h3>
    <input
        id="appPassword"
        type="password"
        placeholder="6文字以上">

    <h3>確認</h3>
    <input
        id="appPasswordConfirm"
        type="password"
        placeholder="もう一度入力">

    <button id="savePassword" class="primary-button">
        設定する
    </button>

</div>

<script type="module" src="set-password.js"></script>

</body>
</html>
