<!DOCTYPE html>
<html lang="ja">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>学生番号登録</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<header class="header">

    <div class="logo">🎓</div>

    <h1>University Notifier</h1>

</header>

<div class="setting-card">

    <h2>アップデートが必要です。</h2>

    <p>

        学生番号・manaba ID・パスワードを登録してください。<br>
        約30秒で完了します。

    </p>

    <h3>学生番号</h3>

    <input
        id="studentNumber"
        type="text"
        maxlength="7"
        placeholder="例：2510044">

    <br><br>

    <h3>manaba ID</h3>

    <input
        id="manabaId"
        type="text"
        placeholder="manabaのログインID">

    <h3>manaba パスワード</h3>

    <input
        id="manabaPassword"
        type="password"
        placeholder="manabaのパスワード">

    <button
        id="register"
        class="primary-button">

        登録する

    </button>

</div>

<script src="student-update.js"></script>

</body>
</html>
