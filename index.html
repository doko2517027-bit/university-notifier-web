<!DOCTYPE html>
<html lang="ja">
<head>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563eb">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>University Notifier</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="splash">
    <div class="splash-content">
        <div class="logo">🎓</div>
        <h1>University Notifier</h1>
    </div>
</div>

<div class="top-buttons">

    <button id="themeButton">
        🌙
    </button>

    <button id="settingButton">
        ⚙️
    </button>

</div>

<header class="header">
    <div class="logo">🎓</div>
    <h1>University Notifier</h1>
    <p>大学時間割変更通知アプリ</p>
</header>

<div id="updateArea">

    <h2>アップデートが必要です。</h2>

    <p>
        学生番号を登録してください。<br>
        約30秒で完了します。
    </p>

    <button id="startUpdate" class="primary-button">
        登録する
    </button>

</div>

<div id="registerArea" style="display:none;">

<h3>学科</h3>

<select id="department">
  <option value="">選択してください</option>
  <option>看護学科</option>
</select>

<h3>専攻</h3>

<select id="major">
  <option value="">選択してください</option>
  <option>理学療法学専攻</option>
  <option>作業療法学専攻</option>
</select>

<h3>学年</h3>

<select id="grade" disabled>
  <option value="">選択してください</option>
  <option>1年</option>
  <option>2年</option>
  <option>3年</option>
  <option>4年</option>
</select>

<h3>学籍番号</h3>

<input
    id="studentNumber"
    type="text"
    maxlength="7"
    placeholder="例：2510044">

<button id="subscribe">
  通知を許可
</button>

</div>

<hr>

<h2>📅 今日の授業</h2>

<div id="todaySchedule">

取得中...

</div>

<hr>

<h2>📢 お知らせ</h2>

<div id="newsList">

まだお知らせはありません

</div>

<footer id="version">
    Version 3.0.0
</footer>

<script type="module" src="app.js"></script>

</body>
</html>
