<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>CareMateApp</title>

<link rel="stylesheet" href="style.css">

<script>
if(localStorage.getItem("theme")==="dark"){
    document.documentElement.classList.add("dark");
}
</script>

</head>
<body class="page-loading">

<div id="splash">
    <div class="splash-content">
        <div class="logo">🎓</div>
        <h1>CareMateApp</h1>
    </div>
</div>

<div id="examPopupOverlay" class="exam-popup-overlay">

    <div class="exam-popup-card">

        <button
            id="closeExamPopup"
            class="exam-popup-close"
            type="button">
            ×
        </button>

        <div class="exam-popup-icon">
            📚
        </div>

        <p id="examPopupLabel" class="exam-popup-label">
            テストのお知らせ
        </p>

        <h2 id="examPopupTitle">
            試験情報
        </h2>

        <p id="examPopupCountdown" class="exam-popup-countdown">
        </p>

        <p id="examPopupPeriod" class="exam-popup-period">
        </p>

        <button
            id="openExamFromPopup"
            class="btn btn-primary">
            テスト対策を開く
        </button>

    </div>

</div>

<div class="top-buttons">

    <div id="userName">
        Unknownさん
    </div>

    <div class="top-right">

        <button
            id="activeMailButton"
            class="circle-button icon-button">

            💌
            <span
                id="activeMailBadge"
                class="notification-badge"
                hidden>
                0
            </span>

        </button>

        <button id="themeButton" class="circle-button">
            🌙
        </button>

        <button id="profileButton" class="circle-button">

            <img
                id="topProfileImage"
                src="images/default.png"
                class="header-profile-image">

        </button>

    </div>

</div>

<div
    id="examStatusCard"
    class="card setting-card"
    style="display:none;">
    <div
        id="examStatusLabel"
        style="
            font-size:13px;
            font-weight:bold;
            color:var(--primary);
            margin-bottom:6px;
        ">
    </div>
    <div
        id="examStatusText"
        style="
            font-size:24px;
            font-weight:800;
            color:var(--text);
        ">
    </div>
    <div
        id="examStatusTitle"
        style="
            margin-top:6px;
            font-size:14px;
            color:var(--subtext);
        ">
    </div>
</div>

<div id="authSetupCards"></div>

<header class="header">
    <div class="logo">🎓</div>
    <h1>CareMateApp</h1>
    <p>大学時間割変更通知アプリ</p>
</header>

<hr>

<h2>📅 講義予定</h2>

<div class="schedule-scroll">
    <div class="card day-card">
        <div id="todayDate" class="day-title"></div>
        <div id="todaySchedule">取得中...</div>
    </div>

    <div class="card day-card">
        <div id="tomorrowDate" class="day-title"></div>
        <div id="tomorrowSchedule">取得中...</div>
    </div>

    <div
        id="examScheduleCard"
        class="card day-card"
        style="display:none;">

        <div class="day-title">
            📚 試験日程
        </div>

        <div class="exam-header">

            <button
                id="examPrev"
                type="button">
                ◀
            </button>

            <span id="examPage">
                1 / 1
            </span>

            <button
                id="examNext"
                type="button">
                ▶
            </button>

        </div>

        <div id="examScheduleList">
            読み込み中...
        </div>

    </div>
</div>

<h2>📝 便利タブ ☀️</h2>

<div class="home-slider">

    <div class="home-slide">
        <div
            id="examCard"
            class="card setting-card home-card"
            style="display:none;">

            <h2>📚 テスト対策</h2>
            <p>AI穴埋め・四択・今日の1問</p>

        </div>
    </div>

    <div class="home-slide">

        <div
            id="weatherCard"
            class="card setting-card home-card">

            <div
                style="
                    display:flex;
                    justify-content:space-between;
                    align-items:center;
                    margin-bottom:12px;
                ">

                <h3 style="
                        margin:0;
                        color:#0f172a;
                    ">

                    🌤 天気
                    
                </h3>

                <span
                    id="weatherDate"
                    style="
                        font-size:13px;
                        color:gray;
                    ">
                </span>

            </div>

            <div
                id="weatherLocation"
                style="
                    font-size:18px;
                    font-weight:bold;
                    margin-bottom:10px;
                ">

                地域

            </div>

            <div
                id="weatherMain"
                style="
                    font-size:30px;
                    font-weight:bold;
                ">

                読み込み中...

            </div>

            <div
                id="weatherDetail"
                style="
                    margin-top:12px;
                ">

            </div>

            <div
                id="weatherUpdated"
                style="
                    margin-top:10px;
                    font-size:12px;
                    color:gray;
                ">
            </div>

        </div>

    </div>

</div>

<hr>

<h2>📢 大学からのお知らせ</h2>

<div id="newsList">

まだお知らせはありません

</div>

<hr>

<h2>📘 コースニュース</h2>

<div id="homeCourseNews">

読み込み中...

</div>

<hr>

<h2>💙 CareMateからのお知らせ</h2>

<div id="homeSystemNews">
    読み込み中...
</div>

<footer id="version"></footer>

<nav class="bottom-nav">

    <a href="index.html" class="active">
        🏠<br>
        <span>ホーム</span>
    </a>

    <a href="assignments.html">
        📚<br>
        <span>課題</span>
    </a>

    <a href="share.html">
        🤝<br>
        <span>共有</span>
    </a>

    <a href="news.html">
        📢<br>
        <span>お知らせ</span>
    </a>

    <a 
	    id="settingsTab"
	    href="settings.html">
        ⚙️<br>
        <span>設定</span>
    </a>

</nav>

<script type="module" src="app.js"></script>

</body>
</html>
