<!DOCTYPE html>
<html lang="ja">
<head>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563eb">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>University Notifier</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>University Notifier</h1>

<p>あなたの学科/専攻・学年を選択し、通知を許可してください。</p>

<h3>学科</h3>

<select id="department">
  <option value="">選択してください</option>
  <option>看護学科</option>
</select>

<h3>専攻</h3>

<select id="major">
  <option value="">選択してください</option>
  <option>理学療法学専攻</option>
  <option>作業療法学専攻</option>
</select>

<h3>学年</h3>

<select id="grade" disabled>
  <option value="">選択してください</option>
  <option>1年</option>
  <option>2年</option>
  <option>3年</option>
  <option>4年</option>
</select>

<button id="subscribe">
  通知を許可
</button>

<hr>

<h2>📢 お知らせ</h2>

<div id="newsList">

まだお知らせはありません

</div>

<script type="module" src="app.js"></script>

</body>
</html>
