<!DOCTYPE html>
<html lang="ja">
<head>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563eb">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>University Notifier</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="splash">
    <div class="splash-content">
        <div class="logo">🎓</div>
        <h1>University Notifier</h1>
    </div>
</div>

<div class="top-buttons">

    <button id="settingButton">
        ⚙️
    </button>

    <button id="themeButton">
        🌙
    </button>

</div>

<header class="header">
    <div class="logo">🎓</div>
    <h1>University Notifier</h1>
    <p>大学時間割変更通知アプリ</p>
</header>

<h3>学科</h3>

<select id="department">
  <option value="">選択してください</option>
  <option>看護学科</option>
</select>

<h3>専攻</h3>

<select id="major">
  <option value="">選択してください</option>
  <option>理学療法学専攻</option>
  <option>作業療法学専攻</option>
</select>

<h3>学年</h3>

<select id="grade" disabled>
  <option value="">選択してください</option>
  <option>1年</option>
  <option>2年</option>
  <option>3年</option>
  <option>4年</option>
</select>

<button id="subscribe">
  通知を許可
</button>

<hr>

<h2>📅 今日の授業</h2>

<div id="todaySchedule">

取得中...

</div>

<hr>

<h2>📢 お知らせ</h2>

<div id="newsList">

まだお知らせはありません

</div>

<footer id="version">
    Version 3.0.0
</footer>

<script type="module" src="app.js"></script>

</body>
</html>
