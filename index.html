<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CareMateApp</title>

<link rel="stylesheet" href="style.css">

<script>
if(localStorage.getItem("theme")==="dark"){
    document.documentElement.classList.add("dark");
}
</script>

</head>
<body class="page-loading">

<div id="splash">
    <div class="splash-content">
        <div class="logo">🎓</div>
        <h1>CareMateApp</h1>
    </div>
</div>

<div class="top-buttons">

    <div id="userName">
        Unknownさん
    </div>

    <div class="top-right">

        <button id="themeButton" class="circle-button">
            🌙
        </button>

        <button id="profileButton" class="circle-button">

            <img
                id="topProfileImage"
                src="images/default.png"
                class="header-profile-image">

        </button>

    </div>

</div>

<header class="header">
    <div class="logo">🎓</div>
    <h1>CareMateApp</h1>
    <p>大学時間割変更通知アプリ</p>
</header>

<hr>

<h2>🚶 通学・天気 ☀️</h2>

<div class="home-slider">

    <div class="home-slide">

        <div
            id="weatherCard"
            class="card setting-card home-card">

            <div
                style="
                    display:flex;
                    justify-content:space-between;
                    align-items:center;
                    margin-bottom:12px;
                ">

                <h3 style="
                        margin:0;
                        color:#0f172a;
                    ">

                    🌤 天気
                    
                </h3>

                <span
                    id="weatherDate"
                    style="
                        font-size:13px;
                        color:gray;
                    ">
                </span>

            </div>

            <div
                id="weatherLocation"
                style="
                    font-size:18px;
                    font-weight:bold;
                    margin-bottom:10px;
                ">

                地域

            </div>

            <div
                id="weatherMain"
                style="
                    font-size:30px;
                    font-weight:bold;
                ">

                読み込み中...

            </div>

            <div
                id="weatherDetail"
                style="
                    margin-top:12px;
                ">

            </div>

            <div
                id="weatherUpdated"
                style="
                    margin-top:10px;
                    font-size:12px;
                    color:gray;
                ">
            </div>

        </div>

    </div>

    <div class="home-slide">

        <div
            id="trainCard"
            class="card setting-card home-card">

            <h3>🚆 電車</h3>

            <div id="trainContent">

                通学設定してください

            </div>

        </div>

    </div>

    <div class="home-slide">

        <div
            id="busCard"
            class="card setting-card home-card">

            <h3>🚌 バス</h3>

            <div id="busContent">

                バス設定してください

            </div>

        </div>

    </div>

</div>

<h2>📅 講義予定</h2>

<div class="schedule-scroll">
    <div class="card day-card">
        <div id="todayDate" class="day-title"></div>
        <div id="todaySchedule">取得中...</div>
    </div>

    <div class="card day-card">
        <div id="tomorrowDate" class="day-title"></div>
        <div id="tomorrowSchedule">取得中...</div>
    </div>
</div>

<hr>

<h2>📢 大学からのお知らせ</h2>

<div id="newsList">

まだお知らせはありません

</div>

<hr>

<h2>📘 コースニュース</h2>

<div id="homeCourseNews">

読み込み中...

</div>

<hr>

<h2>💙 CareMateからのお知らせ</h2>

<div id="homeSystemNews">
    読み込み中...
</div>

<footer id="version"></footer>

<nav class="bottom-nav">

    <a href="index.html" class="active">
        🏠<br>
        <span>ホーム</span>
    </a>

    <a href="assignments.html">
        📚<br>
        <span>課題</span>
    </a>

    <a href="share.html">
        🤝<br>
        <span>共有</span>
    </a>

    <a href="news.html">
        📢<br>
        <span>お知らせ</span>
    </a>

    <a 
	    id="settingsTab"
	    href="settings.html">
        ⚙️<br>
        <span>設定</span>
    </a>

</nav>

<script type="module" src="app.js"></script>

</body>
</html>
